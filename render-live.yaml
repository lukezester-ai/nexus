databases:
  - name: nexus-db
    plan: free
    databaseName: nexus
    user: nexus

services:
  - type: pserv
    name: rabbitmq
    env: image
    image:
      url: rabbitmq:3.12-management
    envVars:
      - key: RABBITMQ_DEFAULT_USER
        value: nexus
      - key: RABBITMQ_DEFAULT_PASS
        value: nexus123

  - type: redis
    name: nexus-redis
    plan: free
    ipAllowList: []

  - type: worker
    name: audit-engine
    env: node
    plan: starter
    buildCommand: npm install -g pnpm@9.15.4 && pnpm install --no-frozen-lockfile &&
