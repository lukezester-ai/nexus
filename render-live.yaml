databases:
  - name: nexus-db
    plan: free
    databaseName: nexus
    user: nexus

services:
  - type: pserv
    name: rabbitmq
    env: image
    image:
      url: rabbitmq:3.12-management
    envVars:
      - key: RABBITMQ_DEFAULT_USER
        value: nexus
      - key: RABBITMQ_DEFAULT_PASS
        value: nexus123

  - type: redis
    name: nexus-redis
    plan: free
    ipAllowList: []

  - type: web
    name: nexus-ui
    env: node
    plan: starter
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/nexus run build
    startCommand: cd artifacts/nexus && pnpm run serve
    envVars:
      - key: NODE_VERSION
        value: 22

  - type: worker
    name: audit-engine
    env: node
    plan: starter
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/audit-engine run build
    startCommand: node --enable-source-maps artifacts/audit-engine/dist/index.mjs
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://nexus:nexus123@rabbitmq:5672
      - key: OPENAI_API_KEY
        sync: false

  - type: worker
    name: strategy-engine
    env: node
    plan: starter
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/strategy-engine run build
    startCommand: node --enable-source-maps artifacts/strategy-engine/dist/index.mjs
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://nexus:nexus123@rabbitmq:5672
      - key: OPENAI_API_KEY
        sync: false

  - type: worker
    name: decision-engine
    env: node
    plan: starter
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/decision-engine run build
    startCommand: node --enable-source-maps artifacts/decision-engine/dist/index.mjs
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: RABBITMQ_URL
        value: amqp://nexus:nexus123@rabbitmq:5672
      - key: OPENAI_API_KEY
        sync: false
